        {
          q: '義民廟主祀的「義民爺」，他們是在哪場歷史事件中犧牲的客家義勇？',
          opts: ['鄭成功反清復明之役', '林爽文事件（1786年）', '牡丹社事件', '乙未抗日之役'],
          ans: 1,
          exp: '1786年林爽文事件中，北台灣客家義民自發組織武力協助清廷平亂，犧牲者被集體祭祀，成為客家族群凝聚認同的重要信仰，義民廟因此成為全台客家信仰中心。'
        },
        {
          q: '客家三合院「夥房」的格局與閩南三合院最大的差別是？',
          opts: ['客家夥房沒有正廳', '客家夥房強調大家族共居，橫屋（護龍）更長更多', '客家夥房使用圓形格局', '客家夥房沒有祖先牌位'],
          ans: 1,
          exp: '客家「夥房」強調大家族聚居，橫屋（護龍）往往延伸多層，可容納數十戶同姓宗親，與閩南三合院相比規模更大，更強調族群聚合的社會結構。'
        },
        {
          q: '新埔一帶以「柿餅」聞名，這與客家人的什麼文化特質有關？',
          opts: ['客家人偏愛甜食', '客家人勤儉惜物、善用農產加工保存食物', '柿餅是祭祀義民爺的供品', '柿餅是客家嫁妝必備'],
          ans: 1,
          exp: '客家文化有「硬頸」精神與勤儉惜物的傳統，柿餅是將新鮮柿子脫水保存的加工食品，反映客家移民善用山地農產、減少浪費的生活智慧，是農業文化的縮影。'
        }
      ]
    }
  ];

  let selectedGuju = null;
  let currentQ = 0;
  let score = 0;
  let answered = false;
  let questions = [];

  function renderTopics() {
    const grid = document.getElementById('topic-grid');
    const icons = ['🏛️', '🌿', '🌾', '🏺', '🌳', '⛩️'];
    grid.innerHTML = GUJU_DATA.map((g, i) => `
    <div class="topic-card" id="tc-${g.id}" onclick="selectTopic('${g.id}')">
      <span class="topic-icon">${icons[i]}</span>
      <div class="topic-name">${g.name}</div>
      <div class="topic-loc">${g.region} ・ ${g.period.split('（')[0]}</div>
    </div>
  `).join('');
  }

  function selectTopic(id) {
    document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('tc-' + id).classList.add('selected');
    selectedGuju = GUJU_DATA.find(g => g.id === id);
    document.getElementById('start-btn').disabled = false;
    document.getElementById('start-btn').textContent = `開始探索「${selectedGuju.name}」 →`;
  }

  function startQuiz() {
    if (!selectedGuju) return;
    questions = [...selectedGuju.questions];
    currentQ = 0;
    score = 0;
    answered = false;
    showScreen('screen-quiz');
    renderQuestion();
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function renderQuestion() {
    const q = questions[currentQ];
    const total = questions.length;
    const pct = (currentQ / total) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('q-counter').textContent = `${currentQ + 1} / ${total}`;
    document.getElementById('score-badge').textContent = `得分 ${score}`;

    document.getElementById('guju-card').innerHTML = `
    <div class="guju-name">${selectedGuju.name}</div>
    <span class="guju-tag">${selectedGuju.region} ・ ${selectedGuju.period}</span>
    <div class="guju-desc">${selectedGuju.desc}</div>
  `;

    document.getElementById('question-text').textContent = `Q${currentQ + 1}. ${q.q}`;
    document.getElementById('options-grid').innerHTML = q.opts.map((o, i) =>
      `<button class="opt-btn" onclick="answer(${i})">${String.fromCharCode(65 + i)}. ${o}</button>`
    ).join('');
    document.getElementById('explain-box').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    answered = false;
  }

  function answer(idx) {
    if (answered) return;
    answered = true;
    const q = questions[currentQ];
    const btns = document.querySelectorAll('.opt-btn');
    btns.forEach(b => b.disabled = true);
    btns[q.ans].classList.add('correct');
    if (idx !== q.ans) {
      btns[idx].classList.add('wrong');
    } else {
      score++;
    }
    document.getElementById('score-badge').textContent = `得分 ${score}`;
    const exp = document.getElementById('explain-box');
    exp.style.display = 'block';
    exp.innerHTML = `<div class="explain-title">${idx === q.ans ? '✓ 答對了！' : '✗ 答錯了'} — 歷史小知識</div>${q.exp}`;
    document.getElementById('next-btn').style.display = 'block';
    document.getElementById('next-btn').textContent = currentQ + 1 < questions.length ? '下一題 →' : '查看成績 →';
  }

  function nextQuestion() {
    currentQ++;
    if (currentQ >= questions.length) {
      showResult();
    } else {
      renderQuestion();
    }
  }

  function showResult() {
    showScreen('screen-result');
    const total = questions.length;
    const pct = Math.round((score / total) * 100);
    let icon, msg, title;
    if (pct === 100) { icon = '🏆'; title = '完美通關！'; msg = `你對「${selectedGuju.name}」的歷史文化瞭如指掌！先人的智慧與故事已深深刻入你的記憶中，歡迎繼續探索其他古厝。`; }
    else if (pct >= 67) { icon = '🎖️'; title = '表現優秀！'; msg = `你掌握了「${selectedGuju.name}」的主要脈絡，對台灣先人拓墾的艱辛有相當深入的了解，再複習一下答錯的題目，歷史知識會更扎實。`; }
    else { icon = '📖'; title = '繼續加油！'; msg = `台灣古厝背後藏著豐富的故事，建議你再挑戰一次，或實際走訪「${selectedGuju.region}」，親眼感受那些建築帶來的時代感動。`; }

    document.getElementById('result-wrap').innerHTML = `
    <span class="result-icon">${icon}</span>
    <div class="result-score">${score} / ${total}</div>
    <div class="result-label">${title} 答對率 ${pct}%</div>
    <div class="result-msg">${msg}</div>
    <div class="medals">
      <span class="medal gold">🥇 全台五大古厝</span>
      <span class="medal silver">🏛️ ${selectedGuju.region} 在地文化</span>
      <span class="medal bronze">📜 ${selectedGuju.period}</span>
    </div>
    <div class="result-actions">
      <button class="btn-retry" onclick="startQuiz()">再挑戰一次</button>
      <button class="btn-explore" onclick="goHome()">探索其他古厝 ↗</button>
    </div>
  `;
  }

  function goHome() {
    showScreen('screen-home');
    selectedGuju = null;
    document.getElementById('start-btn').disabled = true;
    document.getElementById('start-btn').textContent = '選擇古厝開始遊戲 →';
    document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('selected'));
  }

  renderTopics();
</script>
